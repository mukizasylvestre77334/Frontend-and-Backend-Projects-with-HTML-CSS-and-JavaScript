<body> 
<p> how subscribe button works</p>
<button class="jumi" onclick="subscri()"> subscribe</button>
<p class="mukiza">paper rock scissor</p>
<p class="mukiza"> Amazon shipping cost</p>
<p class="mukiza">Order under $40 =+$10 shipping</p>
<p class="mukiza">Order over $40 = free shipping</p>
<input placeholder="input price" class="jumata" onkeydown="post(event)">
<button class="junior" onclick="calcu()">calculate</button>
<p class="out-put"></p>
<p class="out-pu"></p>
<script>
  function subscri() {
    const sub=document.querySelector(".jumi");
    if (sub.innerHTML==="subscribe") {
      sub.innerHTML="subscribed";
      sub.classList.add("is-subscribed");
    } else {sub.innerHTML="subscribe";
      sub.classList.remove("is-subscribed");
    }
    
  };


  function calcu() {
    const pan=document.querySelector(".jumata");
    let muke=(pan.value*100);
    if (muke<0) {
      document.querySelector(".out-put").innerHTML=`Error: the cost can not be less than zero, $${muke/100}`;
      document.querySelector(".out-put").classList.add("out-puti");
    }
    else if (muke<4000) {
      muke=muke+1000;
      document.querySelector(".out-put").innerHTML=`$${muke/100}`;
    document.querySelector(".out-pu").innerHTML="will be the shipping cost";
    } else {muke=muke;
      document.querySelector(".out-put").innerHTML=`$${muke/100}`;
    document.querySelector(".out-pu").innerHTML="will be the shipping cost";
    }
    
    

    
  };

  function post(vie) {
    const tanu= vie.key;
    if (tanu==="Enter") {
      calcu();
    } else if (tanu==="Escape") {
      document.querySelector(".jumata").value=" ";
    }  
  }
</script>
